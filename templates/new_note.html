<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Note · Sandbox</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
    input, textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px; font: inherit; }
    .actions { margin-top: 1.5rem; }
    button { background: #1a2540; color: #fff; padding: 0.5rem 1.25rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    a { color: #555; margin-left: 1rem; }
    .error { color: #b00020; margin-top: 0.25rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>New note :)</h1>

  <form method="POST">
    <label for="title">Title</label>
    <input id="title" name="title" type="text" value="{{ title or '' }}">
    {# TASK 01 will surface a "Title is required" error message here. #}

    <label for="body">Body</label>
    <textarea id="body" name="body" rows="6">{{ body or '' }}</textarea>

    <label for="text_color">Text color</label>
    <input id="text_color" name="text_color" type="color" value="{{ text_color or '#000000' }}" style="width:auto;padding:0.15rem;height:2.2rem;cursor:pointer;">

    <div class="actions">
      <button type="submit">Save note</button>
      <a href="{{ url_for('home') }}">Cancel</a>
    </div>
  </form>

  <script>
    const color = document.getElementById('text_color');
    const title  = document.getElementById('title');
    const body   = document.getElementById('body');

    function applyColor(color) {
      title.style.color = color;
      body.style.color  = color;
    }

    color.addEventListener('input', () => applyColor(color.value));
    applyColor(color.value);
  </script>
</body>
</html>
